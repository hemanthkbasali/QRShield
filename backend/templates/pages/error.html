{% extends "layouts/app.html" %}
{% block title %}{{ status_code }} | QRShield{% endblock %}
{% block app_label %}QRShield Notice{% endblock %}
{% block app_content %}
<section class="invalid-layout">
  <article class="panel-card invalid-card">
    <div class="invalid-symbol">
      <i data-lucide="shield-alert"></i>
    </div>
    <p class="eyebrow">Error {{ status_code }}</p>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <div class="flex flex-wrap justify-center gap-3 mt-7">
      <a class="btn-primary" href="{% url 'scanner' %}"><i data-lucide="scan-line"></i> Open scanner</a>
      <a class="btn-secondary" href="{% url 'dashboard' %}"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    </div>
  </article>
</section>
{% endblock %}
